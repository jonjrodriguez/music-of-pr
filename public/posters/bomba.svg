  <circle cx="1230" cy="650" r="220" fill="#F8EBDD" fill-opacity=".08" />
  <text x="120" y="720" fill="#F8EBDD" font-family="Arial, sans-serif" font-size="132" font-weight="700">Bomba</text>
</svg>
