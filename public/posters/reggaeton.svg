  <circle cx="1270" cy="640" r="230" fill="#E8F8F8" fill-opacity=".08" />
  <text x="120" y="720" fill="#E8F8F8" font-family="Arial, sans-serif" font-size="112" font-weight="700">Reggaeton</text>
</svg>
