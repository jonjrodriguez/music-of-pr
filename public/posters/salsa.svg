  <circle cx="1280" cy="630" r="240" fill="#FFF1E1" fill-opacity=".08" />
  <text x="120" y="720" fill="#FFF1E1" font-family="Arial, sans-serif" font-size="132" font-weight="700">Salsa</text>
</svg>
