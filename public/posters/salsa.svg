<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Salsa Poster</title>
  <desc id="desc">Orange abstract placeholder poster for Salsa.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#502312" />
      <stop offset="100%" stop-color="#D36B1F" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
